model:
  weights: yolov8n.pt
  confidence: 0.3
  iou_threshold: 0.5
  classes: [2, 3, 5, 7]

tracker:
  type: bytetrack

video:
  source: data/sample.mp4
  output: outputs/tracked.mp4

analytics:
  counting_line:
    enabled: true
    start: [0.1, 0.5]
    end: [0.9, 0.5]

display:
  show_ids: true
  show_labels: true
  show_count: true